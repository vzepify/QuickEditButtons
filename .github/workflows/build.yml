name: Build Android Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build unzip wget cargo rustc pkg-config libssl-dev

      - name: Download Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26b" >> $GITHUB_ENV

      - name: Clone Geode SDK
        run: |
          git clone --depth 1 https://github.com/geode-sdk/geode.git geode-sdk
          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      - name: Install Geode CLI
        run: |
          git clone --depth 1 https://github.com/geode-sdk/cli.git geode-cli-src
          cd geode-cli-src
          cargo build --release
          sudo cp target/release/geode /usr/local/bin/geode
          sudo chmod +x /usr/local/bin/geode
          geode --version

      - name: Configure CMake
        run: |
          cmake -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DGEODE_TARGET_PLATFORM=androidos \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-23 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -G Ninja

      - name: Build
        run: cmake --build build-android --config Release

      - name: Upload .geode file
        uses: actions/upload-artifact@v4
        with:
          name: QuickEditButtons
          path: build-android/QuickEditButtons.geode
          if-no-files-found: warn
